name: CI

# Runs tests and lint on every push and pull request against main.
# Deploys are handled separately by Cloudflare's own Git integration
# (Workers & Pages → this worker → Settings → Builds) — not duplicated
# here, to avoid deploying the same push twice.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          # No `cache: npm` — that requires a committed package-lock.json
          # (or yarn.lock/npm-shrinkwrap.json) to key the cache off of,
          # which this repo doesn't have. Caching is a speed optimization,
          # not a requirement, so plain npm install works fine without it.

      - run: npm install

      - name: Run tests
        run: npm test

      - name: Lint
        run: npm run lint

      - name: Check formatting
        run: npm run format:check
