# Coded by: Piererra Felldiaz
name = "line-chat-bot"
main = "src/index.js"
compatibility_date = "2026-07-01"

# Create this KV namespace in the Cloudflare dashboard (Workers & Pages >
# KV) then paste its id here. Stores known_groups and per-group settings
# (welcome/leave templates, sider toggle, known members).
[[kv_namespaces]]
binding = "BOT_KV"
id = "2559ac4d4b964390b881bde1a70131a0"

[triggers]
# Runs hourly. runDailyScheduledTasks() no-ops on every tick except the
# first one to see a new WIB calendar day (normally 17:00 UTC == 00:00
# WIB, with automatic catch-up on the next tick if that one is missed or
# delayed — see src/index.js): announces birthdays every day, and resets
# (Mondays) or posts (every other day) each tracked group's own
# leaderboard.
crons = ["0 * * * *"]
